#     app.kubernetes.io/part-of: ai-platform
# spec:
#   encryptedData:
#     WEBUI_SECRET_KEY: AgBy... (kubeseal 加密后的密文)
#     OPENAI_API_KEY: AgBy... (kubeseal 加密后的密文)
#   template:
#     metadata:
#       name: open-webui-admin
#       namespace: ai-platform
#     type: Opaque