---
# ============================================================
# SealedSecret 使用指南 & 示例模板
# ============================================================
# 
# 安装 kubeseal CLI：
#   wget https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.26.3/kubeseal-0.26.3-linux-amd64.tar.gz
#   tar xzf kubeseal-0.26.3-linux-amd64.tar.gz kubeseal && sudo mv kubeseal /usr/local/bin/
#
# 加密流程：
#   1. 创建 plaintext Secret（不要提交到 Git!）
#      kubectl create secret generic my-secret --from-literal=api-key=xxx -n ai-platform --dry-run=client -o yaml > secret-plain.yaml
#   2. 用 kubeseal 加密：
#      kubeseal -o yaml < secret-plain.yaml > sealed-secret.yaml
#   3. 删除 plaintext Secret，只提交 sealed-secret.yaml 到 Git
#   4. 部署后控制器自动解密为普通 Secret
#
# ============================================================

---
# ============================================================
# 示例：OpenWebUI 管理密钥 / API Key 加密存储
# ============================================================
# 以下是加密后的 SealedSecret 示例（仅供展示格式，需用 kubeseal 重新生成）:
