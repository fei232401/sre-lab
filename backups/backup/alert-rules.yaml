      - alert: PrometheusDuplicateTimestamps
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} is dropping
            {{ printf "%.4g" $value  }} samples/s with different values but duplicated
            timestamp.
          runbook_url: https://runbooks.prometheus-operator.dev/runbooks/prometheus/prometheusduplicatetimestamps
          summary: Prometheus is dropping samples with duplicate timestamps.
        expr: rate(prometheus_target_scrapes_sample_duplicate_timestamp_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m])
          > 0
        for: 10m
        labels:
          severity: warning
      - alert: PrometheusOutOfOrderTimestamps
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} is dropping
            {{ printf "%.4g" $value  }} samples/s with timestamps arriving out of
            order.
          runbook_url: https://runbooks.prometheus-operator.dev/runbooks/prometheus/prometheusoutofordertimestamps
          summary: Prometheus drops samples with out-of-order timestamps.
        expr: rate(prometheus_target_scrapes_sample_out_of_order_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m])
          > 0
        for: 10m
        labels:
          severity: warning
      - alert: PrometheusRemoteStorageFailures
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} failed to
            send {{ printf "%.1f" $value }}% of the samples to {{ $labels.remote_name}}:{{
            $labels.url }}
          runbook_url: https://runbooks.prometheus-operator.dev/runbooks/prometheus/prometheusremotestoragefailures
          summary: Prometheus fails to send samples to remote storage.
        expr: |-
          (
            (rate(prometheus_remote_storage_failed_samples_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m]) or rate(prometheus_remote_storage_samples_failed_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m]))
          /
            (
              (rate(prometheus_remote_storage_failed_samples_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m]) or rate(prometheus_remote_storage_samples_failed_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m]))
            +
              (rate(prometheus_remote_storage_succeeded_samples_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m]) or rate(prometheus_remote_storage_samples_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m]))
            )
          )
          * 100
          > 1
        for: 15m
        labels:
          severity: critical
      - alert: PrometheusRemoteWriteBehind
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} remote write
            is {{ printf "%.1f" $value }}s behind for {{ $labels.remote_name}}:{{
            $labels.url }}.
          runbook_url: https://runbooks.prometheus-operator.dev/runbooks/prometheus/prometheusremotewritebehind
          summary: Prometheus remote write is behind.
        expr: |-
          # Without max_over_time, failed scrapes could create false negatives, see
          # https://www.robustperception.io/alerting-on-gauges-in-prometheus-2-0 for details.
          (
            max_over_time(prometheus_remote_storage_queue_highest_timestamp_seconds{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m])
          -
            max_over_time(prometheus_remote_storage_queue_highest_sent_timestamp_seconds{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m])
          )
          > 120
        for: 15m
        labels:
          severity: critical
      - alert: PrometheusRemoteWriteDesiredShards
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} remote write
            desired shards calculation wants to run {{ $value }} shards for queue
            {{ $labels.remote_name}}:{{ $labels.url }}, which is more than the max
            of {{ printf `prometheus_remote_storage_shards_max{instance="%s",job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}`
            $labels.instance | query | first | value }}.
          runbook_url: https://runbooks.prometheus-operator.dev/runbooks/prometheus/prometheusremotewritedesiredshards
          summary: Prometheus remote write desired shards calculation wants to run
            more than configured max shards.
        expr: |-
          # Without max_over_time, failed scrapes could create false negatives, see
          # https://www.robustperception.io/alerting-on-gauges-in-prometheus-2-0 for details.
          (
            max_over_time(prometheus_remote_storage_shards_desired{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m])
          >
            max_over_time(prometheus_remote_storage_shards_max{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m])
          )
        for: 15m
        labels:
          severity: warning
      - alert: PrometheusRuleFailures
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} has failed
            to evaluate {{ printf "%.0f" $value }} rules in the last 5m.
          runbook_url: https://runbooks.prometheus-operator.dev/runbooks/prometheus/prometheusrulefailures
          summary: Prometheus is failing rule evaluations.
        expr: increase(prometheus_rule_evaluation_failures_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m])
          > 0
        for: 15m
        labels:
          severity: critical
      - alert: PrometheusMissingRuleEvaluations
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} has missed
            {{ printf "%.0f" $value }} rule group evaluations in the last 5m.
          runbook_url: https://runbooks.prometheus-operator.dev/runbooks/prometheus/prometheusmissingruleevaluations
          summary: Prometheus is missing rule evaluations due to slow rule group evaluation.
        expr: increase(prometheus_rule_group_iterations_missed_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m])
          > 0
        for: 15m
        labels:
          severity: warning
      - alert: PrometheusTargetLimitHit
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} has dropped
            {{ printf "%.0f" $value }} targets because the number of targets exceeded
            the configured target_limit.
          runbook_url: https://runbooks.prometheus-operator.dev/runbooks/prometheus/prometheustargetlimithit
          summary: Prometheus has dropped targets because some scrape configs have
            exceeded the targets limit.
        expr: increase(prometheus_target_scrape_pool_exceeded_target_limit_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m])
          > 0
        for: 15m
        labels:
          severity: warning
      - alert: PrometheusLabelLimitHit
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} has dropped
            {{ printf "%.0f" $value }} targets because some samples exceeded the configured
            label_limit, label_name_length_limit or label_value_length_limit.
          runbook_url: https://runbooks.prometheus-operator.dev/runbooks/prometheus/prometheuslabellimithit
          summary: Prometheus has dropped targets because some scrape configs have
            exceeded the labels limit.
        expr: increase(prometheus_target_scrape_pool_exceeded_label_limits_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m])
          > 0
        for: 15m
        labels:
          severity: warning
      - alert: PrometheusScrapeBodySizeLimitHit
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} has failed
            {{ printf "%.0f" $value }} scrapes in the last 5m because some targets
            exceeded the configured body_size_limit.
          runbook_url: https://runbooks.prometheus-operator.dev/runbooks/prometheus/prometheusscrapebodysizelimithit
          summary: Prometheus has dropped some targets that exceeded body size limit.
        expr: increase(prometheus_target_scrapes_exceeded_body_size_limit_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m])
          > 0
        for: 15m
        labels:
          severity: warning
      - alert: PrometheusScrapeSampleLimitHit
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} has failed
            {{ printf "%.0f" $value }} scrapes in the last 5m because some targets
            exceeded the configured sample_limit.
          runbook_url: https://runbooks.prometheus-operator.dev/runbooks/prometheus/prometheusscrapesamplelimithit
          summary: Prometheus has failed scrapes that have exceeded the configured
            sample limit.
        expr: increase(prometheus_target_scrapes_exceeded_sample_limit_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m])
          > 0
        for: 15m
        labels:
          severity: warning
      - alert: PrometheusTargetSyncFailure
        annotations:
          description: '{{ printf "%.0f" $value }} targets in Prometheus {{$labels.namespace}}/{{$labels.pod}}
            have failed to sync because invalid configuration was supplied.'
          runbook_url: https://runbooks.prometheus-operator.dev/runbooks/prometheus/prometheustargetsyncfailure
          summary: Prometheus has failed to sync targets.
        expr: increase(prometheus_target_sync_failed_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[30m])
          > 0
        for: 5m
        labels:
          severity: critical
      - alert: PrometheusHighQueryLoad
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} query API
            has less than 20% available capacity in its query engine for the last
            15 minutes.
          runbook_url: https://runbooks.prometheus-operator.dev/runbooks/prometheus/prometheushighqueryload
          summary: Prometheus is reaching its maximum capacity serving concurrent
            requests.
        expr: avg_over_time(prometheus_engine_queries{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m])
          / max_over_time(prometheus_engine_queries_concurrent_max{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring"}[5m])
          > 0.8
        for: 15m
        labels:
          severity: warning
      - alert: PrometheusErrorSendingAlertsToAnyAlertmanager
        annotations:
          description: '{{ printf "%.1f" $value }}% minimum errors while sending alerts
            from Prometheus {{$labels.namespace}}/{{$labels.pod}} to any Alertmanager.'
          runbook_url: https://runbooks.prometheus-operator.dev/runbooks/prometheus/prometheuserrorsendingalertstoanyalertmanager
          summary: Prometheus encounters more than 3% errors sending alerts to any
            Alertmanager.
        expr: |-
          min without (alertmanager) (
            rate(prometheus_notifications_errors_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring",alertmanager!~``}[5m])
          /
            rate(prometheus_notifications_sent_total{job="prometheus-stack-kube-prom-prometheus",namespace="monitoring",alertmanager!~``}[5m])
          )
          * 100
          > 3
        for: 15m
        labels:
          severity: critical
- apiVersion: monitoring.coreos.com/v1
  kind: PrometheusRule
  metadata:
    annotations:
      argocd.argoproj.io/tracking-id: monitoring-app:monitoring.coreos.com/PrometheusRule:nginx-demo/nginx-demo-rules
      prometheus-operator-validated: "true"
    creationTimestamp: "2026-06-18T10:40:03Z"
    generation: 1
    labels:
      app.kubernetes.io/name: nginx-demo
      release: prometheus-stack
    name: nginx-demo-rules
    namespace: nginx-demo
    resourceVersion: "249636"
    uid: 1a64c9f0-da74-4212-a1e5-9c7ada3b7831
  spec:
    groups:
    - interval: 30s
      name: nginx-demo.availability
      rules:
      - alert: NginxPodDown
        annotations:
          description: Nginx Pod {{ $labels.pod }} 已持续 2 分钟未就绪！
          summary: "\U0001F7E1 Nginx Demo Pod 未就绪"
        expr: kube_pod_status_ready{namespace="nginx-demo", condition="true"} == 0
        for: 2m
        labels:
          severity: warning
          team: web-infra
      - alert: NginxReplicasMismatch
        annotations:
          description: Nginx Deployment 期望 {{ $labels.replicas }} 个副本，但实际可用不足！
          summary: "\U0001F7E1 Nginx 副本数不足"
        expr: kube_deployment_status_replicas_available{namespace="nginx-demo"} <
          kube_deployment_spec_replicas{namespace="nginx-demo"}
        for: 5m
        labels:
          severity: warning
          team: web-infra
- apiVersion: monitoring.coreos.com/v1
  kind: PrometheusRule
  metadata:
    annotations:
      argocd.argoproj.io/tracking-id: monitoring-app:monitoring.coreos.com/PrometheusRule:monitoring/sre-lab-cluster-alerts
      prometheus-operator-validated: "true"
    creationTimestamp: "2026-06-18T10:40:04Z"
    generation: 1
    labels:
      app.kubernetes.io/name: sre-lab-alerts
      app.kubernetes.io/part-of: monitoring
      release: prometheus-stack
    name: sre-lab-cluster-alerts
    namespace: monitoring
    resourceVersion: "249640"
    uid: c279823b-be7f-425a-8ab0-a9187f77f968
  spec:
    groups:
    - interval: 30s
      name: sre-lab.node
      rules:
      - alert: NodeHighMemoryUsage
        annotations:
          description: 节点 {{ $labels.instance }} 内存使用率已超过 90%，持续 5 分钟！当前集群内存 7GB，水位已达
            {{ $value | printf "%.1f" }}%。
          summary: "\U0001F534 节点内存使用率过高"
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) *
          100 > 90
        for: 5m
        labels:
          severity: critical
          team: infra
      - alert: NodeHighCPUUsage
        annotations:
          description: 节点 {{ $labels.instance }} CPU 使用率已超过 80%，持续 10 分钟！
          summary: "\U0001F7E1 节点 CPU 使用率过高"
        expr: (1 - avg by(instance)(irate(node_cpu_seconds_total{mode="idle"}[5m])))
          * 100 > 80
        for: 10m
        labels:
          severity: warning
          team: infra
      - alert: NodeDiskUsageHigh
        annotations:
          description: 节点 {{ $labels.instance }} 分区 {{ $labels.mountpoint }} 磁盘使用率已超过
            85%！
          summary: "\U0001F7E1 节点磁盘使用率过高"
        expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})
          * 100 > 85
        for: 10m
        labels:
          severity: warning
          team: infra
    - interval: 30s
      name: sre-lab.k8s
      rules:
      - alert: PVCNearFull
        annotations:
          description: 'PVC {{ $labels.persistentvolumeclaim }} (ns: {{ $labels.namespace
            }}) 使用率已超过 85%！'
          summary: "\U0001F7E1 PVC {{ $labels.persistentvolumeclaim }} 使用率过高"
        expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes
          > 0.85
        for: 10m
        labels:
          severity: warning
          team: infra
      - alert: PodCrashLooping
        annotations:
          description: 'Pod {{ $labels.pod }} (ns: {{ $labels.namespace }}) 在 1 小时内重启超过
            5 次！'
          summary: "\U0001F534 Pod {{ $labels.pod }} CrashLooping"
        expr: increase(kube_pod_container_status_restarts_total[1h]) > 5
        for: 5m
        labels:
          severity: critical
          team: infra
      - alert: ArgoCDAppOutOfSync
        annotations:
          description: ArgoCD 应用 {{ $labels.name }} 已持续 15 分钟处于 OutOfSync 状态！
          summary: "\U0001F7E1 ArgoCD 应用 {{ $labels.name }} 不同步"
        expr: argocd_app_info{sync_status="OutOfSync"} == 1
        for: 15m
        labels:
          severity: warning
          team: infra
- apiVersion: monitoring.coreos.com/v1
  kind: PrometheusRule
  metadata:
    annotations:
      argocd.argoproj.io/tracking-id: monitoring-app:monitoring.coreos.com/PrometheusRule:ai-platform/ollama-slo-rules
      prometheus-operator-validated: "true"
    creationTimestamp: "2026-06-15T15:28:52Z"
    generation: 2
    labels:
      app.kubernetes.io/part-of: ai-platform
      release: prometheus-stack
    name: ollama-slo-rules
    namespace: ai-platform
    resourceVersion: "249642"
    uid: 402d8240-ed65-4c0c-9c08-81c4f75891fa
  spec:
    groups:
    - interval: 30s
      name: ollama.availability
      rules:
      - alert: OllamaPodDown
        annotations:
          description: Ollama Pod 已持续 2 分钟未就绪，AI 平台无法提供大模型推理服务！请立即检查！
          summary: "\U0001F534 Ollama 推理服务宕机"
        expr: kube_pod_status_ready{namespace="ai-platform", pod=~"ollama-.*", condition="true"}
          == 0
        for: 2m
        labels:
          severity: critical
          team: ai-infra
      - alert: OllamaHighMemoryUsage
        annotations:
          description: Ollama 容器内存使用率已超过限制值的 85%，持续 5 分钟。可能导致 OOMKilled。
          summary: "\U0001F7E1 Ollama 内存使用率过高"
        expr: container_memory_working_set_bytes{namespace="ai-platform", container="ollama"}
          / container_spec_memory_limit_bytes{namespace="ai-platform", container="ollama"}
          > 0.85
        for: 5m
        labels:
          severity: warning
          team: ai-infra
      - alert: OllamaServiceDown
        annotations:
          description: ollama-exporter 连续 3 分钟检测到 Ollama API 不可达 (ollama_up=0)，请检查
            Ollama 服务状态！
          summary: "\U0001F534 Ollama API 不可用 (Exporter 检测)"
        expr: ollama_up == 0
        for: 3m
        labels:
          severity: critical
          team: ai-infra
      - alert: OllamaSlowResponse
        annotations:
          description: Ollama API 响应时间已超过 5 秒，持续 5 分钟。可能是模型加载过大或系统资源不足。
          summary: "\U0001F7E1 Ollama API 响应过慢"
        expr: ollama_api_response_time_seconds > 5
        for: 5m
        labels:
          severity: warning
          team: ai-infra
      - alert: OllamaExporterScrapeErrors
        annotations:
          description: 10 分钟内 Ollama Exporter 采集失败超过 5 次，请检查 Ollama 服务连通性。
          summary: "\U0001F7E1 Ollama Exporter 采集频繁失败"
        expr: increase(ollama_scrape_errors_total[10m]) > 5
        for: 5m
        labels:
          severity: warning
          team: ai-infra
    - interval: 30s
      name: ai-platform.general
      rules:
      - alert: AIPlatformPodCrashLooping
        annotations:
          description: Pod {{ $labels.pod }} 在 1 小时内重启超过 3 次，请检查日志！
          summary: "\U0001F534 AI 平台 Pod CrashLooping"
        expr: increase(kube_pod_container_status_restarts_total{namespace="ai-platform"}[1h])
          > 3
        for: 5m
        labels:
          severity: critical
          team: ai-infra
      - alert: AIPlatformPVCUsageHigh
        annotations:
          description: PVC {{ $labels.persistentvolumeclaim }} 使用率已超过 85%，剩余空间不足！
          summary: "\U0001F7E1 AI 平台 PVC 存储使用率过高"
        expr: kubelet_volume_stats_used_bytes{namespace="ai-platform"} / kubelet_volume_stats_capacity_bytes{namespace="ai-platform"}
          > 0.85
        for: 10m
        labels:
          severity: warning
          team: ai-infra
