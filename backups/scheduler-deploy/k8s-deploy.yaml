---
apiVersion: v1
kind: Namespace
metadata:
  name: scheduler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-model-scheduler
  namespace: scheduler
  labels:
    app: ai-model-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-model-scheduler
  template:
    metadata:
      labels:
        app: ai-model-scheduler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: scheduler
        image: ai-model-scheduler:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9100
          name: metrics
        env:
        - name: OTEL_ENABLED
          value: "1"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-model-scheduler
  namespace: scheduler
  labels:
    app: ai-model-scheduler
spec:
  type: ClusterIP
  ports:
  - port: 9000
    targetPort: 9000
    name: api
  - port: 9100
    targetPort: 9100
    name: metrics
  selector:
    app: ai-model-scheduler
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: scheduler-monitor
  namespace: scheduler
  labels:
    app: ai-model-scheduler
    release: prometheus-stack
spec:
  endpoints:
  - interval: 15s
    path: /metrics
    port: metrics
    scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
    - scheduler
  selector:
    matchLabels:
      app: ai-model-scheduler
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scheduler-ingress
  namespace: scheduler
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - http:
      paths:
      - path: /scheduler
        pathType: Prefix
        backend:
          service:
            name: ai-model-scheduler
            port:
              number: 9000
