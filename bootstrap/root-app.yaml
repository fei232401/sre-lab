apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'git@github.com:fei232401/sre-lab.git' # ⚠️ 替换成你真实的 Git 仓库地址
    targetRevision: main
    path: bootstrap # 🌟 终极套娃：监控自己所在的目录！
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true