---
# =============================================================
# WeChat Adapter (PushPlus)
# 将 Prometheus Alertmanager 的告警转为微信消息推送
# 从集群现有资源收编到 GitOps
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wechat-adapter
  namespace: monitoring
  labels:
    app: wechat-adapter
    app.kubernetes.io/name: wechat-adapter
    app.kubernetes.io/part-of: monitoring
    release: prometheus-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wechat-adapter
  template:
    metadata:
      labels:
        app: wechat-adapter
    spec:
      containers:
      - name: adapter
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args:
        - |
          pip install flask requests > /dev/null 2>&1
          cat << 'PYEOF' > /app.py
          from flask import Flask, request, jsonify
          import requests
          import json
          import logging
          from datetime import datetime

          logging.basicConfig(level=logging.INFO)
          logger = logging.getLogger('wechat-adapter')

          app = Flask(__name__)

          # PushPlus Token
          PUSHPLUS_TOKEN = "28eae010f3a84abd9a25a365a9714da7"
          PUSHPLUS_URL = "http://www.pushplus.plus/send"

          @app.route('/webhook', methods=['POST'])
          def webhook():
              data = request.json
              alerts = data.get('alerts', [])

              for alert in alerts:
                  status = "🔴 触发" if alert['status'] == 'firing' else "✅ 恢复"
                  alertname = alert['labels'].get('alertname', 'Unknown')
                  severity = alert['labels'].get('severity', 'unknown')
                  team = alert['labels'].get('team', 'unknown')
                  title = f"SRE {status}: {alertname}"

                  # 拼装 Markdown 内容
                  now = datetime.now().strftime('%Y-%m-%d %H:%M:%S')
                  content = f"### {title}\n\n"
                  content += f"- **时间**: {now}\n"
                  content += f"- **级别**: {severity}\n"
                  content += f"- **团队**: {team}\n"
                  for k, v in alert['labels'].items():
                      if k not in ('alertname', 'severity', 'team'):
                          content += f"- **{k}**: {v}\n"
                  content += f"\n**描述**: {alert['annotations'].get('description', '无')}\n"
                  content += f"\n**摘要**: {alert['annotations'].get('summary', '无')}\n"

                  payload = {
                      "token": PUSHPLUS_TOKEN,
                      "title": title,
                      "content": content,
                      "template": "markdown"
                  }

                  try:
                      response = requests.post(PUSHPLUS_URL, json=payload, timeout=10)
                      result = response.json()
                      logger.info(f"PushPlus 响应: {result}")
                  except Exception as e:
                      logger.error(f"发送失败: {e}")

              return jsonify({"status": "success"}), 200

          @app.route('/health', methods=['GET'])
          def health():
              return jsonify({"status": "ok"}), 200

          if __name__ == '__main__':
              logger.info("WeChat Adapter 启动")
              app.run(host='0.0.0.0', port=8080)
          PYEOF
          python /app.py
        ports:
        - name: http
          containerPort: 8080
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: wechat-adapter-svc
  namespace: monitoring
  labels:
    app: wechat-adapter
    app.kubernetes.io/name: wechat-adapter
    release: prometheus-stack
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: wechat-adapter
