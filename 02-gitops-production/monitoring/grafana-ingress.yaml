---
# =============================================================
# Grafana Ingress（从集群现有资源收编到 GitOps）
# 路径: /grafana
# 注意: Grafana 已配置 GF_SERVER_ROOT_URL 和 SERVE_FROM_SUB_PATH
# =============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sre-lab-grafana-ingress
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - http:
      paths:
      - backend:
          service:
            name: prometheus-stack-grafana
            port:
              number: 80
        path: /grafana
        pathType: Prefix
