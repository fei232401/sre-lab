services:
  api:
    build: ./api
    ports:
      - "5000:5000"
    depends_on:
      - redis
      - mysql
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 100M
        reservations:
          memory: 20M
  redis:
    image: redis:alpine
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: srelab
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 50M

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
volumes:
  mysql_data:
