services:
  api:
    build: ./api
    ports:
      - "5000:5000"
    depends_on:
      - redis
      - mysql
    networks:
      - backend


  redis:
    image: redis:alpine
    networks:
      - backend

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: srelab
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - backend
networks:
  backend:

volumes:
  mysql_data:
