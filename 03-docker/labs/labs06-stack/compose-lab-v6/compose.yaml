services:
  api:
    build: ./api
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - backend

  redis:
    image: redis
    networks:
      - backend

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    networks:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    networks:
      - frontend
      - backend
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
networks:
  frontend:
  backend:
