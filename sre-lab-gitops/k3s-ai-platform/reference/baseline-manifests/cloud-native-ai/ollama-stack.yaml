apiVersion: v1
kind: Service
metadata:
  name: ollama-headless
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: headless
    app.kubernetes.io/part-of: ai-platform
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: ollama
  ports:
    - name: api
      port: 11434
      targetPort: 11434
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ai-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ollama
  ports:
    - name: api
      port: 11434
      targetPort: 11434
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: inference-engine
    app.kubernetes.io/part-of: ai-platform
spec:
  serviceName: ollama-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/component: inference-engine
        app.kubernetes.io/part-of: ai-platform
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: api
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_ORIGINS
              value: "*"
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
  volumeClaimTemplates:
    - metadata:
        name: ollama-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 20Gi
