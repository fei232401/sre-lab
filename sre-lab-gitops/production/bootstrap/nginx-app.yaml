apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-demo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/fei232401/sre-lab.git'
    targetRevision: main
    path: sre-lab-gitops/production/apps/nginx-demo
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: nginx-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

