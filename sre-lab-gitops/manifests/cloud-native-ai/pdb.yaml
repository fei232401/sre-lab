---
# ============================================================
# PodDisruptionBudget for Ollama (Baseline Version)
# ============================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ollama-pdb
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: high-availability
    app.kubernetes.io/part-of: ai-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: open-webui-pdb
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/component: high-availability
    app.kubernetes.io/part-of: ai-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: open-webui