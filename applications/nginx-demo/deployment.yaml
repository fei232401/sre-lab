apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-nginx
  namespace: nginx-demo
  labels:
    app: my-nginx
    app.kubernetes.io/part-of: nginx-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-nginx
  template:
    metadata:
      labels:
        app: my-nginx
        app.kubernetes.io/part-of: nginx-demo
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
